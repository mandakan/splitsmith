name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Default ``branches: [main]`` skips PRs whose base is a feature
    # branch (stacked PRs). Match every base so each stacked PR also
    # runs CI.
    branches: ["**"]

jobs:
  test:
    name: lint + format + unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        # --all-groups so the dev group (torch / transformers /
        # panns-inference + the ONNX export tools + lint + tests) is
        # installed alongside the slim runtime deps. The shipped wheel
        # is still slim; CI has to exercise both backends.
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src tests scripts

      - name: Format check (black)
        run: uv run black --check src tests scripts

      - name: Run unit tests
        # Integration tests are skipped: they need ffmpeg + the full source video,
        # neither of which lives in the repo.
        run: uv run pytest -q
