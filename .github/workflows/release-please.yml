name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single in-flight run per ref so back-to-back merges don't race
# release-please into opening duplicate release PRs.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Walks the conventional commits since the last tag, maintains
    # an open "chore: release X.Y.Z" PR that bumps pyproject.toml +
    # appends to CHANGELOG.md. When that PR merges, this same job
    # creates the git tag + GitHub Release and exposes
    # ``release_created=true`` to the downstream publish job.
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-pypi:
    # Auto-publish path: release-please cut a release in the previous job.
    # Calls the same reusable workflow that the tag-push path uses, so the
    # actual publish steps + PyPI trusted-publisher claims live in exactly
    # one place (publish-pypi.yml). One PyPI publisher entry suffices because
    # the OIDC ``job_workflow_ref`` claim points at the CALLED workflow.
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  publish-image:
    # Same auto-publish path for the container image. Chained here rather than
    # left to the `tags: v*` push event, which release-please's GITHUB_TOKEN
    # tag does not trigger. release_tag drives the :X.Y.Z / :X.Y / :latest tags.
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish-image.yml
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: read
      packages: write
    secrets: inherit

  deploy-prod:
    # And the production Railway deploy. Chained rather than left to the
    # `release: published` event (GITHUB_TOKEN release does not trigger it).
    # Depends only on release-please, NOT publish-image: the Railway deploy
    # builds from source (`railway up`) and neither needs nor uses the GHCR
    # image. Coupling it to publish-image previously meant a cancelled or
    # failed image build silently skipped the prod deploy (the v0.10.2
    # incident) and, even when green, delayed prod by the ~10 min multi-arch
    # build for no benefit. Prod now deploys in parallel with the image.
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: production
    permissions:
      contents: read
    secrets: inherit
