name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single in-flight run per ref so back-to-back merges don't race
# release-please into opening duplicate release PRs.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Walks the conventional commits since the last tag, maintains
    # an open "chore: release X.Y.Z" PR that bumps pyproject.toml +
    # appends to CHANGELOG.md. When that PR merges, this same job
    # creates the git tag + GitHub Release and exposes
    # ``release_created=true`` to the downstream publish job.
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-pypi:
    # Auto-publish path: release-please cut a release in the previous job.
    # Calls the same reusable workflow that the tag-push path uses, so the
    # actual publish steps + PyPI trusted-publisher claims live in exactly
    # one place (publish-pypi.yml). One PyPI publisher entry suffices because
    # the OIDC ``job_workflow_ref`` claim points at the CALLED workflow.
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
