name: Publish image (GHCR)

# Publishes the splitsmith container image to GitHub Container Registry so
# self-hosted worker operators can `docker pull` instead of building locally
# (see docs/self-hosted-workers.md). The same image runs serve, worker, and
# the self-hosted agent (ENTRYPOINT is the CLI).
#
# Tags:
#   - push to main            -> :edge          (tracks what staging runs)
#   - release (workflow_call) -> :X.Y.Z, :X.Y, :latest
#   - push tag v* / manual    -> safety-net fallbacks for the above
#
# The release path is a `workflow_call` from release-please.yml gated on
# release_created, NOT the tag-push event: a tag created by release-please via
# GITHUB_TOKEN does not trigger tag workflows, so chaining the publish into the
# release run is the only way it fires automatically (same reason publish-pypi
# is chained there). The caller passes release_tag (e.g. v0.8.0); the tag-push
# trigger stays as a manual/recovery net and derives the version from the ref.
#
# Multi-arch (amd64 + arm64): the arm64 leg builds under QEMU emulation and is
# slow (model bake + dependency sync), which is the accepted cost of a manifest
# that runs natively on both x86 servers and ARM boxes.
#
# NOTE (one-time): after the first publish, mark the GHCR package public in the
# repository/package settings, otherwise `docker pull` requires authentication.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to publish as :X.Y.Z/:latest (e.g. v0.8.0); empty builds :edge"
        type: string
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  # Serialise per ref; do not cancel an in-flight release build.
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Two semver sources so both entry paths work: the bare `type=semver`
          # lines read a `refs/tags/v*` push ref (recovery/manual net), and the
          # `value=` lines take the tag from the workflow_call input (the release
          # path, which runs on the main ref and so has no tag in the git ref).
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && inputs.release_tag == '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
