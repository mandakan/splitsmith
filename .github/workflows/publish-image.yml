name: Publish image (GHCR)

# Publishes the splitsmith container image to GitHub Container Registry so
# self-hosted worker operators can `docker pull` instead of building locally
# (see docs/self-hosted-workers.md). The same image runs serve, worker, and
# the self-hosted agent (ENTRYPOINT is the CLI).
#
# Tags:
#   - push to main            -> :edge          (tracks what staging runs)
#   - release tag v*          -> :X.Y.Z, :X.Y, :latest
#   - manual (workflow_dispatch) fallback, since a tag created by
#     release-please via GITHUB_TOKEN does not always trigger tag workflows
#     (same reason publish-pypi carries a manual trigger).
#
# Multi-arch (amd64 + arm64): the arm64 leg builds under QEMU emulation and is
# slow (model bake + dependency sync), which is the accepted cost of a manifest
# that runs natively on both x86 servers and ARM boxes.
#
# NOTE (one-time): after the first publish, mark the GHCR package public in the
# repository/package settings, otherwise `docker pull` requires authentication.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # Serialise per ref; do not cancel an in-flight release build.
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
